<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>TestCapture AI</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="tc-popup">
    <header class="tc-header">
      <div class="tc-brand">
        <div class="tc-logo"></div>
        <div>
          <div class="tc-brand-name">TestCapture AI</div>
          <div class="tc-brand-domain" id="tc-domain">--</div>
        </div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="tc-icon-btn" id="tc-open-dash-top" title="Dashboard" data-testid="popup-open-dashboard-top">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/></svg>
        </button>
        <button class="tc-icon-btn" id="tc-settings-btn" title="Settings" data-testid="popup-settings-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <section class="tc-settings" id="tc-settings-panel" hidden>
      <div class="tc-field">
        <span>AI PROVIDER</span>
        <select id="tc-provider" data-testid="popup-provider-select">
          <option value="copilot">GitHub Copilot</option>
          <option value="anthropic">Anthropic (direct)</option>
          <option value="openai">OpenAI (direct)</option>
          <option value="offline">Offline templates</option>
        </select>
      </div>

      <div class="tc-field tc-provider-block" data-provider="copilot">
        <span>GITHUB COPILOT STATUS</span>
        <div class="tc-status-row">
          <span id="tc-copilot-status" class="tc-pill">Not connected</span>
          <button class="tc-btn tc-btn-secondary" id="tc-connect-copilot" data-testid="popup-connect-copilot">Connect</button>
          <button class="tc-btn tc-btn-ghost" id="tc-disconnect-copilot" hidden data-testid="popup-disconnect-copilot">Disconnect</button>
        </div>
      </div>

      <div class="tc-field tc-provider-block" data-provider="anthropic" hidden>
        <span>ANTHROPIC API KEY</span>
        <input type="password" id="tc-anthropic-key" placeholder="sk-ant-..." data-testid="popup-anthropic-key"/>
      </div>
      <div class="tc-field tc-provider-block" data-provider="openai" hidden>
        <span>OPENAI API KEY</span>
        <input type="password" id="tc-openai-key" placeholder="sk-..." data-testid="popup-openai-key"/>
      </div>

      <div class="tc-field">
        <span>MODEL <button class="tc-linkbtn" id="tc-refresh-models" title="Reload models from provider" data-testid="popup-refresh-models">↻</button></span>
        <select id="tc-model" data-testid="popup-model-select"></select>
      </div>

      <button class="tc-btn tc-btn-primary" id="tc-settings-save" data-testid="popup-settings-save">Save</button>
    </section>

    <section class="tc-record-hero">
      <div class="tc-timer-row">
        <span class="tc-counter" id="tc-step-counter">0</span>
        <span class="tc-counter-label">STEPS</span>
        <span class="tc-divider"></span>
        <span class="tc-timer" id="tc-timer">00:00</span>
      </div>
      <input class="tc-input" id="tc-test-name" placeholder="Test name (e.g. Login flow)" data-testid="popup-test-name-input" />
      <div class="tc-controls">
        <button class="tc-btn tc-btn-record" id="tc-record-btn" data-testid="popup-record-btn">
          <span class="tc-dot"></span><span id="tc-record-label">RECORD</span>
        </button>
        <button class="tc-btn tc-btn-secondary" id="tc-pause-btn" disabled data-testid="popup-pause-btn">PAUSE</button>
      </div>
      <label class="tc-assert-toggle">
        <input type="checkbox" id="tc-assert-mode" data-testid="popup-assert-mode"/>
        <span class="tc-assert-label"><span class="tc-assert-dot"></span> ASSERT MODE</span>
        <span class="tc-assert-hint">click = validate</span>
      </label>
      <label class="tc-pick-toggle">
        <input type="checkbox" id="tc-pick-mode" data-testid="popup-pick-mode"/>
        <span class="tc-assert-label"><span class="tc-pick-dot"></span> PICK ASSERTION</span>
        <span class="tc-assert-hint">click → picker</span>
      </label>
      <div class="tc-shortcut">
        <span class="tc-kbd">Shift</span>+<span class="tc-kbd">Click</span> quick ·
        <span class="tc-kbd">Alt</span>+<span class="tc-kbd">Click</span> picker
      </div>
    </section>

    <section class="tc-recent">
      <div class="tc-section-title">RECENT STEPS · <span id="tc-provider-pill" class="tc-mini-pill">offline</span></div>
      <div class="tc-steps" id="tc-recent-steps">
        <div class="tc-empty">Waiting for interactions…</div>
      </div>
    </section>

    <footer class="tc-footer">
      <select id="tc-framework" class="tc-select" data-testid="popup-framework-select">
        <option value="playwright">Playwright</option>
        <option value="cypress">Cypress</option>
        <option value="selenium">Selenium</option>
        <option value="karate">Karate</option>
      </select>
      <button class="tc-btn tc-btn-primary" id="tc-copy-btn" data-testid="popup-copy-btn">COPY</button>
      <button class="tc-btn tc-btn-secondary" id="tc-export-btn" data-testid="popup-export-btn">EXPORT</button>
      <button class="tc-btn tc-btn-ghost" id="tc-open-dash-btn" data-testid="popup-open-dashboard-btn">DASH →</button>
    </footer>

    <div class="tc-toast" id="tc-toast" hidden></div>
    <script src="lib/ai.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
